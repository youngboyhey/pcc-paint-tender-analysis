name: Scrape PCC Vendor History

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests Pillow curl_cffi scipy numpy

      - name: Run XML scraper (no CAPTCHA needed)
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scraper
          python xml_scrape.py

      - name: Run detail scraper (CAPTCHA + budget/base_price)
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scraper
          python auto_scrape.py
